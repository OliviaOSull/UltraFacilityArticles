<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Download Button</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: #f5f5f5;
    }
    .card {
      background: #fff;
      border-radius: 12px;
      padding: 2rem 2.5rem;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
      text-align: center;
      max-width: 420px;
      width: 100%;
    }
    .card h2 {
      font-size: 18px;
      font-weight: 600;
      margin: 0 0 0.5rem;
      color: #111;
    }
    .card p {
      font-size: 14px;
      color: #666;
      margin: 0 0 1.5rem;
    }
    .download-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: #0f6e56;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 0.75rem 1.5rem;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.15s;
    }
    .download-btn:hover {
      background: #0a5040;
    }
    .download-btn svg {
      flex-shrink: 0;
    }
    .status {
      margin-top: 1rem;
      font-size: 13px;
      color: #888;
      min-height: 20px;
    }
    .status.success { color: #0f6e56; }
    .status.error   { color: #c0392b; }
  </style>
</head>
<body>
  <div class="card">
    <h2>Semiconductor Water Infrastructure Projects</h2>
    <p>Global overview of water infrastructure investments across semiconductor facilities.</p>
    <button class="download-btn" onclick="handleDownload()">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path d="M12 3v13M5 14l7 7 7-7M3 21h18"/>
      </svg>
      Download table (PDF)
    </button>
    <p class="status" id="status"></p>
  </div>
  <script>
    const FILE_URL      = "https://www.desalination.com/static_file_containers/780";
    const FORMSPREE_URL = "https://formspree.io/f/xvzvrbnb";
    const ARTICLE_NAME  = "Semiconductor Water Infrastructure Projects";

    async function handleDownload() {
      const status = document.getElementById("status");
      status.textContent = "";
      status.className = "status";

      fetch(FORMSPREE_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          _subject:  "Download triggered: " + ARTICLE_NAME,
          article:   ARTICLE_NAME,
          page:      window.location.href,
          timestamp: new Date().toISOString(),
          userAgent: navigator.userAgent
        })
      })
      .then(res => {
        if (!res.ok) throw new Error("Formspree error");
        status.textContent = "Download started. Notification sent.";
        status.className = "status success";
      })
      .catch(() => {
        status.textContent = "Download started. (Notification failed — check Formspree endpoint.)";
        status.className = "status error";
      });

      window.open(FILE_URL, "_blank");
    }
  </script>
</body>
</html>
